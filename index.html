<!doctype html>
<html lang="en">
<head>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Archive Collage</title>
  <style>
    :root{
      --bg: #e6e6e6;
      --tile-bg: #ffffff;
      --grid: rgba(0,0,0,0.06);
      --shadow: 0 6px 30px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.12);
      --shadow-hover: 0 10px 40px rgba(0,0,0,.22), 0 4px 10px rgba(0,0,0,.16);
      --accent: #5b7cff;
      --border: rgba(0,0,0,0.12);
      --radius: 8px;
    }

    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      background:
        linear-gradient(0deg, rgba(0,0,0,0.015), rgba(0,0,0,0.015)),
        var(--bg);
      color: #222;
    }

    header {
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(6px);
      background: rgba(255,255,255,0.65);
      border-bottom: 1px solid var(--border);
    }
    .bar {
      display: flex; gap: 10px; align-items: center; justify-content: space-between;
      max-width: 1200px; margin: 0 auto; padding: 10px 16px;
    }
    .bar h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .2px; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn, .chip, .switch {
      background: #fff; border: 1px solid var(--border); border-radius: 999px;
      padding: 8px 12px; cursor: pointer; font: inherit;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04) inset;
    }
    .btn:hover, .chip:hover { border-color: var(--accent); }
    .btn.primary { background: #f3f6ff; border-color: #b8c4ff; color: #2d3d90; }
    .switch { display: inline-flex; align-items: center; gap: 8px; }
    .switch input { accent-color: var(--accent); }

    .stage-wrap {
      max-width: 1200px; margin: 12px auto; padding: 16px;
    }
    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      background:
        radial-gradient(circle at 0 0, rgba(255,255,255,0.9), rgba(255,255,255,0.9)) padding-box,
        repeating-linear-gradient(0deg, var(--grid) 0 1px, transparent 1px 48px),
        repeating-linear-gradient(90deg, var(--grid) 0 1px, transparent 1px 48px);
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .tile {
      position: absolute;
      background: var(--tile-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      user-select: none;
      touch-action: none;
      transition: box-shadow .15s ease, transform .15s ease;
      outline: none;
    }
    .tile:focus { box-shadow: 0 0 0 3px rgba(91,124,255,.35), var(--shadow); }
    .tile:hover { box-shadow: var(--shadow-hover); }
    .img-wrap {
      width: 100%; height: 100%; overflow: hidden; border-radius: calc(var(--radius) - 1px);
      background: #ddd;
    }
    .img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      pointer-events: none;
    }

    .bar-top {
      position: absolute; left: 0; right: 0; top: 0; height: 18px;
      background: rgba(0,0,0,0.85);
      border-top-left-radius: var(--radius);
      border-top-right-radius: var(--radius);
    }

    .s-1 { width: 170px; height: 220px; }
    .s-2 { width: 210px; height: 140px; }
    .s-3 { width: 230px; height: 300px; }
    .s-4 { width: 160px; height: 160px; }
    .s-5 { width: 260px; height: 190px; }

    .ghost { opacity: .9; transform: scale(1.02); }

    model-viewer {
      width: 100%;
      height: 400px;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    @media (max-width: 900px){
      .stage { aspect-ratio: 3 / 4; }
      .s-1 { width: 36vw; height: 44vw; }
      .s-2 { width: 42vw; height: 28vw; }
      .s-3 { width: 46vw; height: 60vw; }
      .s-4 { width: 34vw; height: 34vw; }
      .s-5 { width: 50vw; height: 38vw; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <h1>Archive — Collage</h1>
      <div class="controls">
        <label class="switch"><input id="snapToggle" type="checkbox" checked /> Snap to grid</label>
        <button id="shuffle" class="chip">Shuffle</button>
        <button id="save" class="btn primary">Save layout</button>
        <button id="reset" class="btn">Reset</button>
      </div>
    </div>
  </header>

  <main class="stage-wrap">
    <section class="stage" id="stage" aria-label="Movable collage canvas"></section>
  </main>

   <script>
    const IMAGES = [
      { id: "ceiling-1", src: "images/IMG_1563.PNG", size: "s-2", x: 200,  y: 10,   bar: true },
      { id: "flowers",   src: "images/IMG_3913.PNG",   size: "s-3", x: 360,  y: 110,  bar: false },
      { id: "knit",      src: "images/IMG_3372.PNG",      size: "s-2", x: 610,  y: 110,  bar: true },
      { id: "shelf",     src: "images/IMG_3371.PNG",     size: "s-2", x: 820,  y: 30,   bar: false },
      { id: "snow",      src: "images/IMG_3370.PNG",      size: "s-2", x: 940,  y: 160,  bar: false },
      { id: "lamp",      src: "images/IMG_3366.PNG",      size: "s-2", x: 40,   y: 130,  bar: true },
      { id: "tree",      src: "images/2BC7AA96-4D02-4E8A-8C02-939704DD7535.jpg",      size: "s-2", x: 180,  y: 330,  bar: true },
      { id: "self-vest", src: "images/IMG_1459.PNG", size: "s-3", x: 300,  y: 420,  bar: false },
      { id: "hand",      src: "images/IMG_1530.PNG",      size: "s-3", x: 520,  y: 350,  bar: false },
      { id: "curtain",   src: "images/IMG_1531.PNG",   size: "s-3", x: 720,  y: 420,  bar: false },
      { id: "woman",     src: "images/IMG_1532.PNG",     size: "s-3", x: 40,   y: 500,  bar: false },
      { id: "man-mug",   src: "images/IMG_3305.PNG",   size: "s-3", x: 900,  y: 520,  bar: false },
      { id: "xxx",      src: "images/IMG_2032.PNG",      size: "s-3", x: 520,  y: 350,  bar: false },
      { id: "table",   src: "images/IMG_1557.PNG",   size: "s-3", x: 720,  y: 420,  bar: false },
      { id: "window", src: "images/IMG_2041.PNG",     size: "s-3", x: 40,   y: 500,  bar: false },
      { id: "mug2",   src: "images/IMG_2269.PNG",   size: "s-3", x: 900,  y: 520,  bar: false }
    ];

    const stage = document.getElementById('stage');
    const snapToggle = document.getElementById('snapToggle');
    const saveBtn = document.getElementById('save');
    const resetBtn = document.getElementById('reset');
    const shuffleBtn = document.getElementById('shuffle');
    const STORAGE_KEY = 'archive-collage-v1';

    const tiles = new Map();
    IMAGES.forEach((item, i) => {
      const el = document.createElement('figure');
      el.className = `tile ${item.size}`;
      el.setAttribute('tabindex', '0');
      el.setAttribute('role', 'img');
      el.setAttribute('aria-label', item.id.replace(/[-_]/g,' '));
      el.dataset.id = item.id;

      if (item.bar){
        const strip = document.createElement('div');
        strip.className = 'bar-top';
        el.appendChild(strip);
      }

      const imgWrap = document.createElement('div');
      imgWrap.className = 'img-wrap';
      const img = document.createElement('img');
      img.src = item.src;
      img.alt = '';
      img.loading = 'lazy';
      imgWrap.appendChild(img);
      el.appendChild(imgWrap);

      stage.appendChild(el);
      tiles.set(item.id, { el, ...item });
    });

    function applyInitialLayout(){
      const saved = loadLayout();
      (saved || IMAGES).forEach(cfg => {
        const t = tiles.get(cfg.id);
        if (!t) return;
        const { x = 20, y = 20 } = cfg;
        positionTile(t.el, x, y);
      });
    }

    function positionTile(el, x, y){
      const rect = stage.getBoundingClientRect();
      const tr = el.getBoundingClientRect();
      const maxX = rect.width - tr.width;
      const maxY = rect.height - tr.height;
      const nx = clamp(x, 0, Math.max(0, maxX));
      const ny = clamp(y, 0, Math.max(0, maxY));
      el.style.left = nx + 'px';
      el.style.top  = ny + 'px';
    }
    const clamp = (v, a, b) => Math.min(b, Math.max(a, v));

    let drag = null;
    const gridSize = 24;

    function onPointerDown(e){
      const el = e.target.closest('.tile');
      if (!el) return;
      e.preventDefault();
      const p = pointer(e);
      const rect = el.getBoundingClientRect();
      const srect = stage.getBoundingClientRect();
      drag = { id: el.dataset.id, el, startX: p.x, startY: p.y, origX: rect.left - srect.left, origY: rect.top - srect.top };
      el.classList.add('ghost');
    }

    function onPointerMove(e){
      if (!drag) return;
      const p = pointer(e);
      let x = drag.origX + (p.x - drag.startX);
      let y = drag.origY + (p.y - drag.startY);
      if (snapToggle.checked){
        x = Math.round(x / gridSize) * gridSize;
        y = Math.round(y / gridSize) * gridSize;
      }
      positionTile(drag.el, x, y);
    }

    function onPointerUp(){
      if (!drag) return;
      drag.el.classList.remove('ghost');
      drag = null;
      saveLayout();
    }

    function pointer(e){
      if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    stage.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    stage.addEventListener('touchstart', onPointerDown, { passive: false });
    window.addEventListener('touchmove', onPointerMove, { passive: false });
    window.addEventListener('touchend', onPointerUp);

    stage.addEventListener('keydown', (e) => {
      const el = e.target.closest('.tile');
      if (!el) return;
      const step = snapToggle.checked ? gridSize : 10;
      let moved = false;
      const left = parseFloat(el.style.left || 0);
      const top  = parseFloat(el.style.top || 0);
      switch(e.key){
        case 'ArrowLeft':  positionTile(el, left - step, top);  moved = true; break;
        case 'ArrowRight': positionTile(el, left + step, top);  moved = true; break;
        case 'ArrowUp':    positionTile(el, left, top - step);  moved = true; break;
        case 'ArrowDown':  positionTile(el, left, top + step);  moved = true; break;
        case 'Enter':
        case ' ':
          el.style.zIndex = String((parseInt(el.style.zIndex||'0',10))+1);
          moved = false; break;
      }
      if (moved){ e.preventDefault(); saveLayout(); }
    });

    function currentLayout(){
      const out = [];
      tiles.forEach(({ el, id, size, bar }) => {
        out.push({ id, size, bar, x: parseFloat(el.style.left || 0), y: parseFloat(el.style.top || 0), src: el.querySelector('img').src });
      });
      return out;
    }
    function saveLayout(){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(currentLayout())); } catch(e){} }
    function loadLayout(){ try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch(e){ return null; } }
    function clearLayout(){ try { localStorage.removeItem(STORAGE_KEY); } catch(e){} }

    function shuffle(){
      const rect = stage.getBoundingClientRect();
      tiles.forEach(({ el }) => {
        const tr = el.getBoundingClientRect();
        const x = Math.random() * (rect.width - tr.width);
        const y = Math.random() * (rect.height - tr.height);
        const sx = snapToggle.checked ? Math.round(x / gridSize) * gridSize : x;
        const sy = snapToggle.checked ? Math.round(y / gridSize) * gridSize : y;
        positionTile(el, sx, sy);
      });
      saveLayout();
    }

    saveBtn.addEventListener('click', saveLayout);
    resetBtn.addEventListener('click', () => { clearLayout(); applyInitialLayout(); });
    shuffleBtn.addEventListener('click', shuffle);

    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        tiles.forEach(({ el }) => {
          positionTile(el, parseFloat(el.style.left || 0), parseFloat(el.style.top || 0));
        });
      }, 120);
    });

    applyInitialLayout();
  </script>
</body>
</html>
